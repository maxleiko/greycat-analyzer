# [alias]
# xtask = "run --package xtask --bin xtask --"

# Linux x86-64
[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C",
  "target-cpu=x86-64-v3",
  "-C",
  "target-feature=+avx2,+fma,+sse4.2,+bmi1,+bmi2,+popcnt",
]

# Linux ARM64
[target.aarch64-unknown-linux-gnu]
rustflags = [
  "-C",
  "target-cpu=generic",
  "-C",
  "target-feature=+neon,+crc,+crypto",
]

# macOS ARM64 (Apple Silicon)
[target.aarch64-apple-darwin]
rustflags = [
  "-C",
  "target-cpu=apple-m1",
  "-C",
  "target-feature=+neon,+crc,+crypto,+dotprod,+fp16",
]

# Windows x86-64
[target.x86_64-pc-windows-msvc]
rustflags = [
  "-C",
  "target-cpu=x86-64-v3",
  "-C",
  "target-feature=+avx2,+fma,+sse4.2,+bmi1,+bmi2,+popcnt",
]

# Development builds - use native CPU when building locally
[env]
CARGO_TARGET_DIR = { value = "target", relative = true }
