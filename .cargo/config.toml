# [alias]
# xtask = "run --package xtask --bin xtask --"

# Linux x86-64
# https://github.com/flamegraph-rs/flamegraph?tab=readme-ov-file#linux
[target.x86_64-unknown-linux-gnu]
linker = "/usr/bin/clang"
rustflags = [
  "-Ctarget-cpu=x86-64-v3",
  "-Ctarget-feature=+avx2,+fma,+sse4.2,+bmi1,+bmi2,+popcnt",
  "-Clink-arg=-fuse-ld=lld",
  "-Clink-arg=-Wl,--no-rosegment" 
]

# Linux ARM64
[target.aarch64-unknown-linux-gnu]
rustflags = [
  "-Ctarget-cpu=generic",
  "-Ctarget-feature=+neon,+crc,+crypto",
]

# macOS ARM64 (Apple Silicon)
[target.aarch64-apple-darwin]
rustflags = [
  "-Ctarget-cpu=apple-m1",
  "-Ctarget-feature=+neon,+crc,+crypto,+dotprod,+fp16",
]

# Windows x86-64
[target.x86_64-pc-windows-msvc]
rustflags = [
  "-Ctarget-cpu=x86-64-v3",
  "-Ctarget-feature=+avx2,+fma,+sse4.2,+bmi1,+bmi2,+popcnt",
]

# Development builds - use native CPU when building locally
[env]
CARGO_TARGET_DIR = { value = "target", relative = true }
