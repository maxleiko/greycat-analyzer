# [PackageDev] target_format: plist, ext: tmLanguage
---
name: Greycat
scopeName: source.gcl
fileTypes: [gcl]
uuid: 395c9937-c471-412d-bdd7-43da892e0cee

variables:
  startOfIdentifier: (?<!{{alphanum}})(?:(?<!\.))
  endOfIdentifier: (?!{{alphanum}})(?:(?!(\.|->|::)))
  startOfDeclaration: '{{startOfIdentifier}}(?:(\extern)\s+)?'
  alpha: '[a-zA-Z_]'
  alphanum: '[a-zA-Z0-9_]'
  identifier: '{{alpha}}{{alphanum}}*'
  propertyAccessPreIdentifier: (\.|->|::)\s*
  numSuffix: ({{identifier}})
  num: '[0-9][0-9_]*'
  numExp: '[eE][+-]?'
  decimalNumber: |-
    (?<!\$)(?:
      (?:\b{{num}}(\.){{num}}({{numExp}}){{num}}({{numSuffix}})?\b)| # 1.1E+3
      (?:\b{{num}}(\.)({{numExp}}){{num}}({{numSuffix}})?\b)|        # 1.E+3
      (?:\b{{num}}({{numExp}}){{num}}({{numSuffix}})?\b)|            # 1E+3
      (?:\b{{num}}(\.){{num}}({{numSuffix}})?\b)|                    # 1.1
      (?:\b{{num}}(\.)({{numSuffix}})?\B)|                           # 1.
      (?:\b{{num}}({{numSuffix}})?\b)                                # 1
    )(?!\$)

patterns:
  - include: '#common'

repository:
  common:
    patterns:
    - include: '#doc'
    - include: '#identifier-or-keyword'
    - include: '#literals'
    - include: '#string'
    - include: '#comment'
    - include: '#brackets'

  identifier-or-keyword:
    patterns:
    - include: '#keyword'
    - include: '#identifier'

  keyword:
    patterns:
    - name: storage.modifier.gcl
      match: \b(abstract|as|at|break|continue|catch|do|else|enum|extends|for|fn|if|in|is|limit|native|private|sampling|skip|static|throw|try|type|use|var|while|without|task)\b(?![\(\)\]\.\;\:\=\>\}\{\-])
    - name: storage.modifier.gcl
      match: \b(return|break|continue)\b
    - name: variable.language.this.gcl
      match: \b(this)\b
    - name: constant.language.gcl
      match: \b(true|false|null)\b
    - name: variable.other.constant.gcl meta.annotation.gcl
      match: \@\b{{identifier}}\b
    - name: variable.other.constant.gcl primitive.constant.type.gcl
      match: \b(int|float|i8|u8|f8|i16|u16|f16|i32|f32|u32|f64|u64|i64|bool|time|duration|geo|any|char|node|nodeTime|nodeIndex|nodeList|nodeGeo)\b(?![\.\(:=}{-])

  identifier:
    patterns:
    - name: meta.definition.function.gcl entity.name.function.gcl
      match: '\b({{identifier}})\b(?=[^\.(:=;$->}{]*\()'
    - name: variable.other.constant.gcl
      match: '\b((?=_?[A-Z])({{identifier}})?)\b'
    - name: variable.other.readwrite.gcl
      match: '\b({{identifier}})\b'

  doc:
    begin: \@doc
    end: '(?=\))'
    beginCaptures:
      '0': { name: variable.other.constant.doc.gcl meta.annotation.doc.gcl }
    patterns:
      - include: '#comment'
      - include: '#doc-markdown'

  doc-markdown:
    patterns:
    - include: '#comment'
    # single line
    - match: '(")(.*)(")'
      captures:
        '1': { name: string.template.begin.doc.gcl }
        '2': { name: comment.block.gcl }
        '3': { name: string.template.end.doc.gcl }
    # multi line
    - begin: '"'
      end: '(?<!\\)\s*(")\s*(?=\))'
      beginCaptures:
        '0': { name: string.template.begin.doc.gcl }
      endCaptures:
        '1': { name: string.template.end.doc.gcl }
      contentName: comment.block.gcl
      # TODO re-enable the fenced-code-gcl once we have another
      # way to escape string literals in doc
      # patterns:
      # - include: '#fenced-code-gcl'

  fenced-code-gcl:
    begin: '^(\s*)(`{3,}|~{3,})\s*(?i:(gcl|greycat)((\s+|:|\{)[^`~]*)?$)'
    end: '^(\2|\s{0,3})(\3)\s*$'
    name: 'markup.fenced_code.block.gcl'
    beginCaptures:
      '3': { name: 'punctuation.definition.gcl' }
      '4': { name: 'fenced_code.block.language.gcl' }
      '5': { name: 'fenced_code.block.language.attributes.gcl' }
    endCaptures:
      '3': { name: 'punctuation.definition.gcl' }
    patterns:
    - begin: '^(\s*)'
      while: '^(?!\s*([`~]{3,})\s*$)'
      contentName: 'meta.embedded.block.gcl'
      patterns:
      - include: 'source.gcl'

  brackets:
    patterns:
    - begin: '{'
      end: '}|(?=\*/)'
      patterns:
      - include: '#common'
    - begin: '\['
      end: '\]|(?=\*/)'
      patterns:
      - include: '#common'

  literals:
    patterns:
      - include: '#numeric-literal'

  numeric-literal:
    name: constant.numeric.gcl
    patterns:
    - name: constant.numeric.gcl meta.delimiter.underscore.gcl
      match: '_'
    - match: '([0-9][0-9]*)(\.)?'
      captures:
        '1': { name: constant.numeric.decimal.gcl }
        '2': { name: constant.numeric.gcl meta.delimiter.decimal.period.gcl }
    - name: constant.numeric.gcl storage.type.numeric.exponent.gcl
      match: '[eE][+-]?'
    - name: constant.numeric.gcl storage.type.numeric.suffix.gcl
      match: '{{identifier}}'

  string:
    patterns:
    - include: '#char-literal'
    - include: '#template'

  char-literal:
    name: string.quoted.single.gcl
    begin: "'"
    beginCaptures:
      '0': { name: punctuation.definition.string.begin.gcl }
    end: (\')|((?:[^\\\n])$)
    endCaptures:
      '1': { name: punctuation.definition.string.end.gcl }
      '2': { name: invalid.illegal.newline.gcl }
    patterns:
    - include: '#string-character-escape'

  template:
    name: string.template.gcl
    begin: '"'
    beginCaptures:
      '0': { name: punctuation.definition.string.template.begin.gcl }
    end: '"'
    endCaptures:
      '0': { name: punctuation.definition.string.template.end.gcl}
    patterns:
    - include: '#template-interpolation'
    - include: '#string-character-escape'

  template-interpolation:
    name: meta.template.expression.gcl
    begin: \$\{
    beginCaptures:
      '0': { name: punctuation.definition.template-expression.begin.gcl }
    end: \}
    endCaptures:
      '0': { name: punctuation.definition.template-expression.end.gcl }
    patterns:
      - include: '#common'
    contentName: meta.embedded.line.gcl

  string-character-escape:
    name: constant.character.escape.gcl
    match: \\(x[0-9A-Fa-f]{2}|[0-2][0-7]{0,2}|3[0-6][0-7]?|37[0-7]?|[4-7][0-7]?|.|$)

  comment:
    patterns:
    - name: comment.block.gcl
      begin: (/\*)
      beginCaptures:
        '1': { name: punctuation.definition.comment.gcl }
      end: \*/
      endCaptures:
        '0': { name: punctuation.definition.comment.gcl }
    - begin: (^[ \t]+)?((//)(?:((@)pragma)\s))
      beginCaptures:
        '1': { name: punctuation.whitespace.comment.leading.gcl }
        '2': { name: comment.line.double-slash.gcl }
        '3': { name: punctuation.definition.comment.gcl }
        '4': { name: storage.type.internaldeclaration.gcl }
        '5': { name: punctuation.decorator.internaldeclaration.gcl }
      end: (?=$)
      patterns:
        - name: variable.other.constant.gcl
          match: '\b((?=_?[A-Z])({{identifier}})?)\b'
        - name: meta.definition.function.gcl entity.name.function.gcl
          match: '\b({{identifier}})\b'
      contentName: comment.line.double-slash.gcl
    - begin: (^[ \t]+)?((//)(?!@pragma))
      beginCaptures:
        '1': { name: punctuation.whitespace.comment.leading.gcl }
        '2': { name: comment.line.double-slash.gcl }
      end: (?=$)
      contentName: comment.line.double-slash.gcl
