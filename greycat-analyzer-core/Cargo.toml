[package]
name = "greycat-analyzer-core"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4.27"
lsp-types = "0.97.0"
line-index = "0.1.2"
serde = { version = "1.0.219", features = ["derive"] }
md5 = "0.8.0"
bumpalo = { version = "3.19.0", features = ["collections", "serde"] }
tree-sitter = "0.26"
greycat-analyzer-syntax = { path = "../greycat-analyzer-syntax" }
#md5 = "0.8.0"

[dev-dependencies]
pretty_assertions = "1.4.1"
