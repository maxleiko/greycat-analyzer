name: Parity oracle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# P18.4 — typed-AST parity gauntlet.
#
# Runs `dump-types` / `dump-resolutions` over the canonical fixtures
# (project.gcl, optionally lib/std and the registry corpus) for both
# the Rust port and the TS reference, applies the divergences allow-
# list (tests/parity/divergences.toml), and asserts the diff line-count
# is ≤ the committed baseline at tests/parity/<corpus>/.
#
# The TS reference binary is not always available in CI (it ships in
# the GreyCat distribution, not on Cargo). The job is gated on the
# `parity` label / `parity` job dispatch so contributors with the TS
# reference installed can run it locally; CI runs it when the runner
# has greycat-lang on PATH.
jobs:
  parity-types:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.pull_request.labels.*.name, 'parity') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Rust port (release)
        run: cargo build --release -p greycat-analyzer

      - name: Locate TS reference
        id: ts
        run: |
          if command -v greycat-lang >/dev/null 2>&1; then
            echo "ts=$(command -v greycat-lang)" >> "$GITHUB_OUTPUT"
          else
            echo "TS reference not on PATH — skipping parity gauntlet" >&2
            exit 0
          fi

      - name: Parity-types (project.gcl)
        if: ${{ steps.ts.outputs.ts != '' }}
        env:
          GREYCAT_LANG: ${{ steps.ts.outputs.ts }}
          GREYCAT_RUST: ${{ github.workspace }}/target/release/greycat-analyzer
        run: |
          mkdir -p .parity-out
          bash scripts/parity-types.sh project.gcl > .parity-out/types.diff || true
          actual=$(grep -cE '^[-+]\{' .parity-out/types.diff || true)
          baseline=$(grep -cE '^[-+]\{' tests/parity/project_gcl/types.diff || true)
          echo "[parity-types] actual=$actual baseline=$baseline"
          test "$actual" -le "$baseline" || (echo "Parity diff grew (was $baseline, now $actual)" >&2; exit 1)

      - name: Parity-resolutions (project.gcl)
        if: ${{ steps.ts.outputs.ts != '' }}
        env:
          GREYCAT_LANG: ${{ steps.ts.outputs.ts }}
          GREYCAT_RUST: ${{ github.workspace }}/target/release/greycat-analyzer
        run: |
          bash scripts/parity-resolutions.sh project.gcl > .parity-out/resolutions.diff || true
          actual=$(grep -cE '^[-+]\{' .parity-out/resolutions.diff || true)
          baseline=$(grep -cE '^[-+]\{' tests/parity/project_gcl/resolutions.diff || true)
          echo "[parity-resolutions] actual=$actual baseline=$baseline"
          test "$actual" -le "$baseline" || (echo "Parity diff grew (was $baseline, now $actual)" >&2; exit 1)
