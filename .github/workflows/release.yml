name: Release

# Release workflow.
#
# Trigger:
#   - Pushing a tag matching `v*` (e.g. `v0.1.0`, `v0.2.0-rc1`).
#   - Manual `workflow_dispatch` (with a `tag` input) for re-runs without
#     re-tagging.
#
# Builds the `greycat-analyzer` CLI on each target, packages it as a
# `.tar.gz` (Unix) or `.zip` (Windows), and attaches the archives plus a
# `SHA256SUMS` file to a GitHub Release named after the tag.
#
# **The release is created in draft mode** so you can review the
# attached artifacts before publishing. Promote to a real release from
# the GitHub UI when ready.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write  # needed for the release action to create / upload

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          submodules: recursive
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        env:
          # tree-sitter is compiled via the `cc` crate; the musl target
          # needs an explicit musl-targeting compiler and linker.
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release -p greycat-analyzer --target ${{ matrix.target }}

      - name: Stage artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          target="${{ matrix.target }}"
          name="greycat-analyzer-${tag}-${target}"
          stage="$(pwd)/_dist/${name}"
          mkdir -p "$stage"
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp "target/${target}/release/greycat-analyzer.exe" "$stage/"
          else
            cp "target/${target}/release/greycat-analyzer" "$stage/"
            # Strip is a no-op on already-stripped builds; tolerate
            # `strip` differences across platforms.
            strip "$stage/greycat-analyzer" 2>/dev/null || true
          fi
          cp LICENSE-MIT LICENSE-APACHE README.md "$stage/" 2>/dev/null || true
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "stage=$stage" >> "$GITHUB_OUTPUT"

      - name: Pack (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          cd _dist
          tar -czf "${{ steps.stage.outputs.name }}.tar.gz" "${{ steps.stage.outputs.name }}"

      - name: Pack (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Set-Location _dist
          Compress-Archive -Path "${{ steps.stage.outputs.name }}" -DestinationPath "${{ steps.stage.outputs.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: _dist/${{ steps.stage.outputs.name }}.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Compute SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _release
          # Each artifact landed in its own subdir; flatten + checksum.
          find _artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} _release/ \;
          cd _release
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS
          ls -la

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            _release/*.tar.gz
            _release/*.zip
            _release/SHA256SUMS
