name: Release

# Release workflow.
#
# Trigger:
#   - Pushing a tag matching `v*` (e.g. `v0.1.0`, `v0.2.0-rc1`).
#   - Manual `workflow_dispatch` (with a `tag` input) for re-runs without
#     re-tagging.
#
# Builds the `greycat-analyzer` CLI on each target, packages it as a
# `.zip` archive (Info-ZIP `zip` on Unix to preserve the executable
# bit, `Compress-Archive` on Windows), and attaches the archives plus a
# `SHA256SUMS` file to a GitHub Release named after the tag.
#
# **The release is created in draft mode** so you can review the
# attached artifacts before publishing. Promote to a real release from
# the GitHub UI when ready.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write  # needed for the release action to create / upload

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Use HTTPS for hub.datathings.com submodules
        run: git config --global url."https://hub.datathings.com/".insteadOf "git@hub.datathings.com:"
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        env:
          # tree-sitter is compiled via the `cc` crate; the musl target
          # needs an explicit musl-targeting compiler and linker.
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release -p greycat-analyzer --target ${{ matrix.target }}

      - name: Stage binary
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          # Asset filename intentionally version-less so that
          # `https://github.com/<repo>/releases/latest/download/<name>.zip`
          # resolves stably across releases. Version is implicit from the
          # release tag, and `greycat-analyzer --version` self-reports.
          name="greycat-analyzer-${target}"
          mkdir -p _dist
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp "target/${target}/release/greycat-analyzer.exe" _dist/
          else
            cp "target/${target}/release/greycat-analyzer" _dist/
            # Strip is a no-op on already-stripped builds; tolerate
            # `strip` differences across platforms.
            strip "_dist/greycat-analyzer" 2>/dev/null || true
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Pack (zip, unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          cd _dist
          # Info-ZIP preserves the executable bit via the ZIP extra
          # fields; `Compress-Archive` on Windows strips it but Windows
          # builds have no Unix mode bits anyway.
          zip "${{ steps.stage.outputs.name }}.zip" greycat-analyzer

      - name: Pack (zip, windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location _dist
          Compress-Archive -Path greycat-analyzer.exe -DestinationPath "${{ steps.stage.outputs.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: _dist/${{ steps.stage.outputs.name }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Compute SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _release
          # Each artifact landed in its own subdir; flatten + checksum.
          find _artifacts -type f -name '*.zip' -exec cp {} _release/ \;
          cd _release
          sha256sum *.zip > SHA256SUMS
          ls -la

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            _release/*.zip
            _release/SHA256SUMS
