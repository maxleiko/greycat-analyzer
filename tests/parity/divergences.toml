# P18.3 — parity-oracle allow-list.
#
# Each [[entry]] declares an *intentional* divergence between the TS
# reference's `dump-types` shape and the Rust port's. The
# `scripts/_apply_divergences.py` filter rewrites TS records (and Rust
# records) into a single canonical form before the gauntlet diffs them,
# so the gate only fires on *unintended* drift.
#
# Schema:
#   kind            — TS-side CST kind name the divergence applies to.
#                     Required.
#   ts_type         — what TS emits in the `type` field. Either `ts_type`
#                     or `rust_type` (or both) must be present.
#   rust_type       — what the Rust port emits.
#   canonical_type  — what to rewrite both shapes to before diffing.
#                     Defaults to `rust_type` (we generally prefer the
#                     more precise Rust shape).
#   reason          — one-line justification, rooted in the language
#                     reference, NOT TS-inertia.
#
# Operating principle (see ROADMAP §18, "TS-side dump tooling"): the TS
# reference is the *compliance oracle for the type system*, but the
# Rust port may ship strictly-better shapes where TS conflates concepts.
# Each entry below records one such case.

# -----------------------------------------------------------------------------
# Method-reference value vs call result.
# -----------------------------------------------------------------------------
# When the user writes `x.s.method` (no call parens), TS auto-evaluates
# the access to the method's *return* type, conflating the method-
# reference value with the call result. Per the language reference,
# methods are first-class `function` values in `.gcl`, so the precise
# typing is `function`, not the return type. The Rust port's P16.1
# implementation follows the language reference: `MemberDef::Method →
# Named("function")`.
#
# Once P16.4 lights up call-on-member return-type inference, the *call*
# result `x.s.method()` will type as the return type in both engines —
# this allow-list entry only covers the *bare* member-ref shape.
#
# Example: `var f = "hello".size;`
#   TS:   `core::int`
#   Rust: `core::function`
[[entry]]
kind = "InstanceAccessExpr"
rust_type = "core::function"
ts_type = "core::int"
canonical_type = "core::function"
reason = "method-ref value typing — methods are first-class function values, not their return type"

# -----------------------------------------------------------------------------
# Bare-fn-name reference value.
# -----------------------------------------------------------------------------
# When a fn declaration is referenced as a value (`var f = some_fn;`,
# passed as a callback, or as the callee of a Call expression), TS
# treats the bare ident inconsistently: as `core::any | null` for
# value-position references, but as the call's *return type* when the
# ident is the immediate callee of a `Call` (TS auto-evaluates the
# callee). The Rust port resolves these via
# `resolve_bare_ident_decl_shape` (P15.x) and types them precisely as
# `core::function`, matching the language reference (functions are
# first-class values).
#
# `match_by_position = true` widens the rule: any TS Identifier record
# at the *same* (file, range) as a Rust record typed `core::function`
# is rewritten to `core::function` regardless of TS's local shape. This
# is what handles the `rehydrate_from_disk()` callee case where TS
# emits `core::int` (the call's return type) instead of `core::any | null`.
[[entry]]
kind = "Identifier"
rust_type = "core::function"
ts_type = "core::any | null"
canonical_type = "core::function"
match_by_position = true
reason = "bare fn-decl reference — Rust port specializes via resolve_bare_ident_decl_shape; functions are first-class values"

# -----------------------------------------------------------------------------
# Bare-type-name reference value.
# -----------------------------------------------------------------------------
# Similar to above for type decls used as values (`var t = MyType;`):
# TS=`core::any | null`, Rust=`core::type` (the runtime reflection
# value's type).
[[entry]]
kind = "Identifier"
rust_type = "core::type"
ts_type = "core::any | null"
canonical_type = "core::type"
match_by_position = true
reason = "bare type-decl reference — runtime type reflection values are typed as `type`"
