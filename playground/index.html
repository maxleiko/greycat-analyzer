<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>greycat-analyzer playground</title>
    <script>
      const dark = matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.classList.add(dark ? "wa-dark" : "wa-light");
    </script>
  </head>
  <body class="wa-cloak">
    <header class="topbar">
      <strong>greycat-analyzer playground</strong>
      <span class="grow"></span>
      <span id="bytes" class="muted">0 bytes</span>
    </header>

    <wa-split-panel position="50" class="layout">
      <div slot="start" class="editor-pane">
        <div id="editor-host"></div>
      </div>
      <div slot="end" class="panels">
        <wa-tab-group class="panel-tabs">
          <wa-tab slot="nav" panel="diagnostics">Diagnostics</wa-tab>
          <wa-tab slot="nav" panel="cst">CST</wa-tab>
          <wa-tab slot="nav" panel="tokens">Tokens</wa-tab>
          <wa-tab slot="nav" panel="hir">HIR</wa-tab>
          <wa-tab slot="nav" panel="types">Types</wa-tab>
          <wa-tab slot="nav" panel="format">Format</wa-tab>

          <wa-tab-panel name="diagnostics">
            <gc-diagnostics-panel></gc-diagnostics-panel>
          </wa-tab-panel>
          <wa-tab-panel name="cst">
            <gc-cst-panel></gc-cst-panel>
          </wa-tab-panel>
          <wa-tab-panel name="tokens">
            <gc-tokens-panel></gc-tokens-panel>
          </wa-tab-panel>
          <wa-tab-panel name="hir">
            <gc-hir-panel></gc-hir-panel>
          </wa-tab-panel>
          <wa-tab-panel name="types">
            <gc-types-panel></gc-types-panel>
          </wa-tab-panel>
          <wa-tab-panel name="format">
            <gc-format-panel></gc-format-panel>
          </wa-tab-panel>
        </wa-tab-group>
      </div>
    </wa-split-panel>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
