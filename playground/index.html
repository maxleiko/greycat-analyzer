<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>greycat-analyzer playground</title>
    <script>
      // WebAwesome's default theme is class-driven (`.wa-dark` / `.wa-light`).
      // Set it before the body renders so we don't flash the wrong theme.
      const dark = matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.add(dark ? 'wa-dark' : 'wa-light');
    </script>
  </head>
  <body>
    <gc-playground></gc-playground>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
