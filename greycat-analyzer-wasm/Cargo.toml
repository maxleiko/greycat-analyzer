[package]
name = "greycat-analyzer-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
greycat-analyzer-syntax = { path = "../greycat-analyzer-syntax" }
greycat-analyzer-core = { path = "../greycat-analyzer-core" }
greycat-analyzer-hir = { path = "../greycat-analyzer-hir" }
greycat-analyzer-types = { path = "../greycat-analyzer-types" }
greycat-analyzer-analysis = { path = "../greycat-analyzer-analysis" }
greycat-analyzer-fmt = { path = "../greycat-analyzer-fmt" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
wasm-bindgen = { version = "0.2.100" }

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["--enable-bulk-memory", "--enable-nontrapping-float-to-int"]